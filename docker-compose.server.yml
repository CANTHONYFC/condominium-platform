# Producción EC2 — stack completo (Postgres + Redis + Backend + Frontend)
# Uso:
#   docker-compose --env-file backend/.env.prod -f docker-compose.server.yml up -d --build
#
# Acceso público: http://<IP-EC2>/  (puerto 80)
# API vía nginx:  http://<IP-EC2>/api/v1
# Swagger:        http://<IP-EC2>/docs  (si SWAGGER_ENABLED=true)

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: condominium-postgres
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-condominium}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-condominium_secret}
      POSTGRES_DB: ${POSTGRES_DB:-condominium_platform}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: condominium-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: condominium-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    environment:
      NODE_ENV: production
      PORT: 3000
      # Hosts internos de la red Docker (sobrescriben localhost del .env.prod)
      DATABASE_URL: postgresql://${POSTGRES_USER:-condominium}:${POSTGRES_PASSWORD:-condominium_secret}@postgres:5432/${POSTGRES_DB:-condominium_platform}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - '3000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: condominium-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
