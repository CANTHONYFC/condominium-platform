# Local:  docker compose --profile dev up -d
# Prod:   docker compose --profile prod up -d --build
#
# Prod carga backend/.env.prod solo (env_file). No hace falta --env-file en el comando.
# Acceso prod: http://<IP>/  |  API: http://<IP>/api/v1

services:
  # ── Dev: solo infra (backend/front con npm en el host) ─────────────────────
  postgres-dev:
    profiles: [dev]
    image: postgres:16-alpine
    container_name: condominium-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: condominium
      POSTGRES_PASSWORD: condominium_secret
      POSTGRES_DB: condominium_platform
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U condominium -d condominium_platform']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prod ──────────────────────────────────────────────────────────────────
  postgres:
    profiles: [prod]
    image: postgres:16-alpine
    container_name: condominium-postgres
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    profiles: [dev, prod]
    image: redis:7-alpine
    container_name: condominium-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    profiles: [prod]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: condominium-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    environment:
      NODE_ENV: production
      PORT: 3000
      # Fuerza hosts de la red Docker (por si .env.prod trae localhost)
      REDIS_HOST: redis
      REDIS_PORT: '6379'
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - '3000'

  frontend:
    profiles: [prod]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: condominium-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
