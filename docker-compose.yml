services:
  postgres:
    image: postgres:16-alpine
    container_name: condominium-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: condominium
      POSTGRES_PASSWORD: condominium_secret
      POSTGRES_DB: condominium_platform
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U condominium -d condominium_platform']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: condominium-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
