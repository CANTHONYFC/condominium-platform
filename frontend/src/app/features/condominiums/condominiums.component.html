<div class="page-header">
  <div>
    <app-page-heading emphasis="Configuración" accent="de estructura" [subtitle]="pageSubtitle()" />
  </div>
  <button mat-flat-button color="primary" (click)="openCreate()">
    <mat-icon fontSet="material-icons-round">add</mat-icon>
    {{ createButtonLabel() }}
  </button>
</div>

@if (loading()) {
  <div class="loading-center"><mat-spinner diameter="40"></mat-spinner></div>
} @else {
  <mat-card class="content-card">
    <table mat-table [dataSource]="items()" class="w-full data-table">
      <ng-container matColumnDef="code">
        <th mat-header-cell *matHeaderCellDef>Código</th>
        <td mat-cell *matCellDef="let row"><strong>{{ row.code }}</strong></td>
      </ng-container>
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let row">{{ row.name }}</td>
      </ng-container>
      <ng-container matColumnDef="city">
        <th mat-header-cell *matHeaderCellDef>Ciudad</th>
        <td mat-cell *matCellDef="let row">{{ row.city || '—' }}</td>
      </ng-container>
      <ng-container matColumnDef="units">
        <th mat-header-cell *matHeaderCellDef>Unidades</th>
        <td mat-cell *matCellDef="let row">{{ row.totalUnits }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let row">
          <span class="badge" [class.badge--green]="row.isActive" [class.badge--gray]="!row.isActive">
            {{ row.isActive ? 'Activo' : 'Inactivo' }}
          </span>
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button [matMenuTriggerFor]="menu">
            <mat-icon fontSet="material-icons-round">more_vert</mat-icon>
          </button>
          <mat-menu #menu="matMenu">
            <a mat-menu-item [routerLink]="['/estructuras', row.id]">
              <mat-icon fontSet="material-icons-round">account_tree</mat-icon>
              Estructura
            </a>
            <button mat-menu-item (click)="openEdit(row)">
              <mat-icon fontSet="material-icons-round">edit</mat-icon>
              Editar
            </button>
            <button mat-menu-item (click)="confirmDelete(row)">
              <mat-icon fontSet="material-icons-round">delete</mat-icon>
              Eliminar
            </button>
          </mat-menu>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="cols"></tr>
      <tr mat-row *matRowDef="let row; columns: cols"></tr>
    </table>
    @if (!items().length) {
      <div class="empty-state">{{ emptyStateText() }}</div>
    }
  </mat-card>
}
