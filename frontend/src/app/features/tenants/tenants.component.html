<div class="page-header">
  <div>
    <app-page-heading
      emphasis="Empresas"
      accent="clientes"
      subtitle="Admin general: registra condominios o edificios y define cupo de usuarios"
    />
  </div>
  @if (canManage) {
    <button mat-flat-button color="primary" (click)="openCreate()">
      <mat-icon fontSet="material-icons-round">domain_add</mat-icon> Nueva empresa
    </button>
  }
</div>

@if (loading()) {
  <div class="loading-center"><mat-spinner diameter="40"></mat-spinner></div>
} @else {
  <mat-card class="content-card">
    <table mat-table [dataSource]="items()" class="w-full data-table">
      <ng-container matColumnDef="code"><th mat-header-cell *matHeaderCellDef>Código</th><td mat-cell *matCellDef="let t"><strong>{{ t.code }}</strong></td></ng-container>
      <ng-container matColumnDef="name"><th mat-header-cell *matHeaderCellDef>Nombre</th><td mat-cell *matCellDef="let t">{{ t.name }}</td></ng-container>
      <ng-container matColumnDef="type"><th mat-header-cell *matHeaderCellDef>Tipo</th><td mat-cell *matCellDef="let t">{{ orgLabel(t) }}</td></ng-container>
      <ng-container matColumnDef="users"><th mat-header-cell *matHeaderCellDef>Usuarios</th><td mat-cell *matCellDef="let t">{{ t.usersCount ?? 0 }}</td></ng-container>
      <ng-container matColumnDef="maxUsers"><th mat-header-cell *matHeaderCellDef>Cupo</th><td mat-cell *matCellDef="let t">{{ t.maxUsers }}</td></ng-container>
      <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Estado</th><td mat-cell *matCellDef="let t"><span [class]="t.isActive ? 'badge badge--green' : 'badge badge--gray'">{{ t.isActive ? 'Activa' : 'Inactiva' }}</span></td></ng-container>
      <ng-container matColumnDef="actions"><th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let t">
          <div class="table-actions">
            @if (canEdit) {
              <button mat-icon-button type="button" class="table-actions__primary" (click)="openEdit(t)" title="Editar empresa" aria-label="Editar empresa">
                <mat-icon fontSet="material-icons-round">edit</mat-icon>
              </button>
            }
            <button
              mat-icon-button
              type="button"
              [class.table-actions__warn]="t.isActive"
              [class.table-actions__success]="!t.isActive"
              (click)="toggleActive(t)"
              [title]="t.isActive ? 'Inhabilitar empresa' : 'Activar empresa'"
              [attr.aria-label]="t.isActive ? 'Inhabilitar empresa' : 'Activar empresa'"
            >
              <mat-icon fontSet="material-icons-round">{{ t.isActive ? 'block' : 'check_circle' }}</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="cols"></tr>
      <tr mat-row *matRowDef="let row; columns: cols"></tr>
    </table>
  </mat-card>
}
