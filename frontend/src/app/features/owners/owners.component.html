<div class="page-header">
  <div>
    <app-page-heading emphasis="Propietarios" subtitle="Personas naturales y jurídicas — asígnelas a un departamento en el detalle" />
  </div>
  <div class="flex gap-2">
    <button mat-stroked-button (click)="exportExcel()">
      <mat-icon fontSet="material-icons-round">download</mat-icon> Exportar
    </button>
    <button mat-flat-button color="primary" (click)="openCreate()">
      <mat-icon fontSet="material-icons-round">person_add</mat-icon> Nuevo
    </button>
  </div>
</div>

@if (loading()) {
  <div class="loading-center"><mat-spinner diameter="40"></mat-spinner></div>
} @else {
  <mat-card class="content-card">
    <table mat-table [dataSource]="items()" class="w-full data-table">
      <ng-container matColumnDef="document">
        <th mat-header-cell *matHeaderCellDef>Documento</th>
        <td mat-cell *matCellDef="let o">{{ o.documentType }} {{ o.documentNumber }}</td>
      </ng-container>
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let o"><strong>{{ displayName(o) }}</strong></td>
      </ng-container>
      <ng-container matColumnDef="location">
        <th mat-header-cell *matHeaderCellDef>Departamento / ubicación</th>
        <td mat-cell *matCellDef="let o">
          <span [class.text-slate-400]="unitLocation(o) === 'Sin asignar'">{{ unitLocation(o) }}</span>
        </td>
      </ng-container>
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let o">{{ o.email || '—' }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let o"><span class="badge badge--green">{{ o.status }}</span></td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let o">
          <button mat-icon-button [matMenuTriggerFor]="menu"><mat-icon fontSet="material-icons-round">more_vert</mat-icon></button>
          <mat-menu #menu="matMenu">
            <a mat-menu-item [routerLink]="['/owners', o.id]">
              <mat-icon fontSet="material-icons-round">visibility</mat-icon> Ver detalle
            </a>
            <button mat-menu-item (click)="openEdit(o)">
              <mat-icon fontSet="material-icons-round">edit</mat-icon> Editar
            </button>
            <button mat-menu-item (click)="confirmDelete(o)">
              <mat-icon fontSet="material-icons-round">delete</mat-icon> Eliminar
            </button>
          </mat-menu>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="cols"></tr>
      <tr mat-row *matRowDef="let row; columns: cols"></tr>
    </table>
  </mat-card>
}
